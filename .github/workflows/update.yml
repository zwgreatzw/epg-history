name: Auto Update EPG History

on:
  schedule:
    # 每天 UTC 时间 18:00 运行（对应北京时间凌晨 2:00，日本时间凌晨 3:00）
    - cron: '0 18 * * *'
  workflow_dispatch: # 这个配置允许我们在网页上点击一个按钮来手动测试运行

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run EPG merge script
        run: python update_epg.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add guide_history.xml
          git commit -m "Auto-update EPG history" || echo "No changes to commit"
          git push
